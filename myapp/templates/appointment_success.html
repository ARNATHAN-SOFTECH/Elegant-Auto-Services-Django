{% extends "base.html" %}
{% load static %}

{% block title %}Appointment Confirmed | Elegant Way Auto Maint{% endblock %}

{% block content %}
<style>
   
    .success-wrapper {
        padding: 100px 0; 
        background-color: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh; 
    }

    .success-container {
        text-align: center;
        background-color: #1a1a1a;
        padding: 50px 30px;
        border-radius: 15px;
        border-top: 5px solid #ff6600; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        max-width: 500px;
        width: 90%;
        animation: pop 0.5s ease-out;
    }

    .icon-box {
        width: 80px;
        height: 80px;
        background-color: #028702; 
        color: white;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 20px;
        font-size: 40px;
        font-weight: bold;
    }

    .success-container h1 {
        color: #ff6600;
        font-size: 2.5rem;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .success-container p {
        color: #cccccc;
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .btn-home-success {
        display: inline-block;
        background-color: #ff6600;
        color: #000;
        text-decoration: none;
        padding: 12px 30px;
        border-radius: 25px;
        font-weight: bold;
        transition: transform 0.2s, background-color 0.2s;
    }

    .btn-home-success:hover {
        background-color: #e65c00;
        transform: scale(1.05);
        color: #000;
    }

    @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
</style>

<section class="success-wrapper">
    <div class="success-container">
        <div class="icon-box">✓</div>
        <h1>Success!</h1>
        <p>Thank you for contacting us.<br>Your appointment has been booked, and we will get in touch with you shortly.</p>
        <a href="{% url 'home' %}" class="btn-home-success">Return to Home</a>
    </div>
</section>
{% endblock %}
